<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>七夕！天の川みくじ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to bottom, #0B1026, #1F2954);
            color: #fff;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #start-screen, #game-screen, #result-screen, #camera-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .hidden { display: none !important; }

        /* ボタン共通 */
        .btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #0B1026;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            cursor: pointer;
        }
        .btn-easy {
            background: linear-gradient(45deg, #FF69B4, #FF1493);
            color: #fff;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
        }
        .btn-hard {
            background: linear-gradient(45deg, #4169E1, #00008B);
            color: #fff;
            box-shadow: 0 5px 15px rgba(65, 105, 225, 0.4);
        }
        .btn-sub { background: #444; color: #fff; box-shadow: none; font-size: 14px; padding: 8px 20px; }

        /* 短冊カードの配置 */
        #card-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
        }
        .tanzaku-card {
            width: 80px;
            height: 200px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }
        .tanzaku-card:active { transform: scale(0.95); }
        
        /* 短冊の色分け */
        .tanzaku-1 { background: #FFB6C1; border-left: 6px solid #FF69B4; }
        .tanzaku-2 { background: #E0FFFF; border-left: 6px solid #00CED1; }
        .tanzaku-3 { background: #98FB98; border-left: 6px solid #32CD32; }
        
        .tanzaku-text {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-weight: bold;
            font-size: 16px;
            writing-mode: vertical-rl;
            letter-spacing: 6px;
        }

        /* 📷 カメラ表示 */
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            background: #000;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        #frame-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 5;
        }
        #preview-canvas { display: none; }
        #taken-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 4; }
        .camera-controls { display: flex; gap: 10px; margin-top: 15px; }

        .bg-star { position: absolute; background: white; border-radius: 50%; animation: blink 2s infinite alternate; }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="stars-bg"></div>

    <div id="start-screen">
        <h1 style="color: #FFD700; margin-bottom: 5px; font-size: 28px;">七夕！天の川みくじ</h1>
        <p style="font-size: 14px; margin-bottom: 30px; color: #add8e6;">短冊をえらんで、限定フォトフレームをもらおう！</p>
        
        <div style="display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 280px;">
            <button class="btn btn-easy" onclick="selectDifficulty('easy')">👦 初級をひく<br><span style="font-size:11px; font-weight:normal;">大当たりの確率が高いよ！</span></button>
            <button class="btn btn-hard" onclick="selectDifficulty('hard')">🔥 上級をひく<br><span style="font-size:11px; font-weight:normal;">どきどきリアル運試し！</span></button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <h2 style="color: #FFD700; font-size: 22px;">好きな短冊を1枚選んでね</h2>
        <p style="font-size: 13px; margin-top: 5px; color: #ccc;">どれをえらんでもカメラが起動するよ</p>
        
        <div id="card-container">
            <div class="tanzaku-card tanzaku-1" onclick="drawOmikuji()">
                <div class="tanzaku-text">ねがいごと</div>
            </div>
            <div class="tanzaku-card tanzaku-2" onclick="drawOmikuji()">
                <div class="tanzaku-text">天の川</div>
            </div>
            <div class="tanzaku-card tanzaku-3" onclick="drawOmikuji()">
                <div class="tanzaku-text">なつまつり</div>
            </div>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <p style="font-size: 16px; color: #add8e6; margin-bottom: 5px;">あなたの運勢は…</p>
        <h2 id="result-title" style="font-size: 40px; margin-bottom: 15px; text-shadow: 0 0 10px #FFD700;"></h2>
        <p id="result-text" style="font-size: 16px; margin-bottom: 30px; white-space: pre-line; line-height: 1.6;"></p>
        
        <button class="btn" onclick="openCamera()">このフレームでカメラを起動</button>
        <button class="btn btn-sub" onclick="resetGame()" style="margin-top: 20px;">タイトルへ戻る</button>
    </div>

    <div id="camera-screen" class="hidden">
        <h2 style="color: #FFD700; font-size: 18px; margin-bottom: 10px;" id="camera-instruction">はい、チーズ！</h2>
        
        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
            <img id="frame-overlay" src="" alt="Frame">
            <img id="taken-image" class="hidden">
        </div>

        <div id="before-shoot" class="camera-controls">
            <button class="btn btn-sub" onclick="switchCamera()">🔄 カメラ切替</button>
            <button class="btn" onclick="takePhoto()">📸 パシャリ！</button>
        </div>

        <div id="after-shoot" class="camera-controls hidden">
            <button class="btn btn-sub" onclick="retakePhoto()">🔄 撮り直し</button>
            <a id="download-link" download="tanabata_photo.png">
                <button class="btn" style="background: linear-gradient(45deg, #00FF7F, #00CE66); color: #fff;">💾 保存する</button>
            </a>
        </div>
        
        <button class="btn btn-sub" onclick="closeCamera()" style="margin-top: 25px;">戻る</button>
        <canvas id="preview-canvas"></canvas>
    </div>

    <script>
        // 背景の星生成
        const bg = document.getElementById('stars-bg');
        for(let i=0; i<40; i++) {
            let star = document.createElement('div'); star.className = 'bg-star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.top = Math.random() * 100 + 'vh'; star.style.left = Math.random() * 100 + 'vw';
            bg.appendChild(star);
        }

        // --- ⚙️ おみくじとフォトフレームの設定 ---
        let currentMode = 'easy';
        let selectedFrame = ""; // 当たったフレームのURLを保存する変数

        // 🌟 3パターンの結果と、それぞれのフォトフレーム画像のURLを設定してください
        const omikujiResults = {
            amanogawa: {
                title: "天の川吉 ✨",
                text: "最高のラッキー！\n満天の星空があなたに幸運を届けてくれるよ。",
                frame: "https://example.com/frame-amanogawa.png" // 天の川フレームのURL
            },
            orihime: {
                title: "織姫彦星吉 💞",
                text: "すてきなハッピー！\nたいせつな人との願い事が叶うかもしれないね。",
                frame: "https://example.com/frame-orihime.png" // 織姫彦星フレームのURL
            },
            sasanoha: {
                title: "笹の葉吉 🎋",
                text: "まったりラッキー！\n短冊に書いた願い事が、風にのって天まで届くよ。",
                frame: "https://example.com/frame-sasanoha.png" // 笹の葉フレームのURL
            }
        };

        function selectDifficulty(mode) {
            currentMode = mode;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        }

        // 短冊をタップした時の処理（フリーズ要素は一切ありません）
        function drawOmikuji() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let resultKey = "sasanoha";
            const rand = Math.random();

            // 初級と上級で、当選確率の比率を変える処理
            if (currentMode === 'easy') {
                // 初級：天の川吉 60% / 織姫彦星吉 30% / 笹の葉吉 10%
                if (rand < 0.6) resultKey = "amanogawa";
                else if (rand < 0.9) resultKey = "orihime";
                else resultKey = "sasanoha";
            } else {
                // 上級：均等（各33.3%）
                if (rand < 0.33) resultKey = "amanogawa";
                else if (rand < 0.66) resultKey = "orihime";
                else resultKey = "sasanoha";
            }

            const result = omikujiResults[resultKey];
            
            // 結果を画面に表示
            document.getElementById('result-title').innerText = result.title;
            document.getElementById('result-text').innerText = result.text;
            
            // 重要：当たった種類に応じたフォトフレーム画像URLをセット
            selectedFrame = result.frame;
            document.getElementById('frame-overlay').src = selectedFrame;
        }

        function resetGame() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        // --- 📷 カメラ機能（前回の安定版を踏襲） ---
        let currentStream = null;
        let useFacingMode = "user"; 

        async function openCamera() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('camera-screen').classList.remove('hidden');
            retakePhoto();
            await initCamera();
        }

        async function initCamera() {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); }
            const video = document.getElementById('video');
            if(useFacingMode === "user") { video.classList.add('mirror'); } else { video.classList.remove('mirror'); }

            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFacingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
                    audio: false
                });
                video.srcObject = currentStream;
            } catch (err) {
                console.error("カメラ起動失敗:", err);
                alert("カメラの起動に失敗しました。カメラ使用を許可してください。");
            }
        }

        async function switchCamera() {
            useFacingMode = (useFacingMode === "user") ? "environment" : "user";
            await initCamera();
        }

        function takePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('preview-canvas');
            const ctx = canvas.getContext('2d');
            const frameImg = document.getElementById('frame-overlay');
            const takenImage = document.getElementById('taken-image');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.save();
            if (useFacingMode === "user") {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

            const dataUrl = canvas.toDataURL('image/png');
            takenImage.src = dataUrl;
            takenImage.classList.remove('hidden');

            document.getElementById('download-link').href = dataUrl;
            document.getElementById('before-shoot').classList.add('hidden');
            document.getElementById('after-shoot').classList.remove('hidden');
            document.getElementById('camera-instruction').innerText = "きれいに撮れたかな？";
        }

        function retakePhoto() {
            document.getElementById('taken-image').classList.add('hidden');
            document.getElementById('taken-image').src = "";
            document.getElementById('before-shoot').classList.remove('hidden');
            document.getElementById('after-shoot').classList.add('hidden');
            document.getElementById('camera-instruction').innerText = "はい、チーズ！";
        }

        function closeCamera() {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; }
            document.getElementById('camera-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
