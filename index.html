<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>エスパルス ARフォトフレーム</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        
        /* 1. 【画面表示の設定】横幅を100%固定し、上下ははみ出させる設定 */
        #ar-frame-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #ar-frame {
            width: 100vw;  /* 横幅をスマホ画面に100%固定 */
            height: 100vh;
            object-fit: cover; /* 比率を保ったまま、画面いっぱいに広げる（上下がはみ出る） */
        }

        /* 📸 シャッターボタン（エスパルスオレンジ） */
        #shutter-btn {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 75px; height: 75px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 5px solid #ff7f00;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            outline: none;
        }
        #shutter-btn:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* 🔄 カメラ切り替えボタン */
        #switch-camera-btn {
            position: fixed;
            bottom: 40px; right: 30px;
            width: 50px; height: 50px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid #fff;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
        }
        #switch-camera-btn:active {
            transform: scale(0.9);
        }

        /* 🖼️ 撮影後の写真ポップアップ表示（上部配置レイアウト） */
        #result-popup {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            box-sizing: border-box;
        }
        
        #result-img {
            width: 85%;
            max-height: 55vh;
            object-fit: contain;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .popup-text {
            color: white;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.6;
            margin: 0 20px 25px 20px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* ボタンを横並びにするためのコンテナ */
        .popup-btn-container {
            display: block;
            text-align: center;
            width: 85%;
        }

        /* 共通ボタンベーススタイル */
        .popup-btn {
            border: none;
            padding: 12px 0;
            font-size: 14px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 46%;          
            margin: 0 2%;        
            display: inline-block;
            box-sizing: border-box;
            vertical-align: middle;
        }

        /* もう一度撮るボタン */
        #close-btn {
            background: #ff7f00;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 127, 0, 0.3);
        }
        #close-btn:active {
            background: #e06f00;
        }

        /* 画像を保存ボタン */
        #save-btn {
            background: #ffffff;
            color: #ff7f00;
            border: 2px solid #ff7f00;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        #save-btn:active {
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <div id="ar-frame-container">
        <img id="ar-frame" src="frame.png" alt="ARフォトフレーム" crossorigin="anonymous">
    </div>

    <button id="shutter-btn"></button>
    <button id="switch-camera-btn">🔄</button>

    <div id="result-popup" style="display: none;">
        <img id="result-img" src="" alt="撮影された写真">
        <p class="popup-text">「画像を保存」から共有画面を開き、<br>「画像を保存」を選ぶと写真フォルダに入ります。<br>(または画像を長押しでも保存できます)</p>
        
        <div class="popup-btn-container">
            <button id="close-btn" class="popup-btn" onclick="閉じるポップアップ()">もう一度撮る</button>
            <button id="save-btn" class="popup-btn">画像を保存</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" gl-attributes="preserveDrawingBuffer: true">
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const シャッターボタン = document.getElementById('shutter-btn');
        const カメラ切り替えボタン = document.getElementById('switch-camera-btn');
        const ポップアップ = document.getElementById('result-popup');
        const 結果画像 = document.getElementById('result-img');
        const 保存ボタン = document.getElementById('save-btn');
        
        let 現在のカメラモード = 'environment'; 
        let 撮影された画像Blob = null; // 共有用にバイナリデータを保持する変数

        // 📸 シャッターボタンを押した時の処理
        シャッターボタン.addEventListener('click', () => {
            const ビデオ要素 = document.querySelector('video');
            const フレーム画像 = document.getElementById('ar-frame');

            if (!ビデオ要素) {
                alert('カメラの準備ができていないか、許可されていません。');
                return;
            }

            const キャンバス = document.createElement('canvas');
            const コンテキスト = キャンバス.getContext('2d');

            const 幅 = ビデオ要素.videoWidth || ビデオ要素.clientWidth || 1280;
            const 高 = ビデオ要素.videoHeight || ビデオ要素.clientHeight || 720;
            キャンバス.width = 幅;
            キャンバス.height = 高;

            // 1. 背景としてカメラ映像を描画
            コンテキスト.save();
            if (現在のカメラモード === 'user') {
                コンテキスト.translate(キャンバス.width, 0);
                コンテキスト.scale(-1, 1);
            }
            コンテキスト.drawImage(ビデオ要素, 0, 0, キャンバス.width, キャンバス.height);
            コンテキスト.restore();

            // 2. フレーム画像を合成
            const フレーム元の幅 = フレーム画像.naturalWidth || フレーム画像.width || 1;
            const フレーム元の高 = フレーム画像.naturalHeight || フレーム画像.height || 1;
            const 描画幅 = キャンバス.width;
            const 描画高 = キャンバス.width * (フレーム元の高 / フレーム元の幅);
            const オフセットX = 0;
            const オフセットY = (キャンバス.height - 描画高) / 2;

            コンテキスト.drawImage(フレーム画像, オフセットX, オフセットY, 描画幅, 描画高);

            try {
                // 画面表示用URLの生成
                結果画像.src = キャンバス.toDataURL('image/png');
                
                // 【新機能】共有メニューに渡すための「ファイルデータ」を同時に生成
                キャンバス.toBlob((blob) => {
                    撮影された画像Blob = blob;
                }, 'image/png');

                ポップアップ.style.display = 'flex';
            } catch (エラー) {
                alert('写真の撮影に失敗しました。HTTPSサーバー上で実行してください。');
                console.error(エラー);
            }
        });

        // 💾 「画像を保存」ボタンを押した時の処理（共有メニューの呼び出し）
        保存ボタン.addEventListener('click', async () => {
            if (!撮影された画像Blob) {
                alert('保存する画像データがまだ準備できていません。しばらく待ってから再度お試しください。');
                return;
            }

            // 擬似的なファイルオブジェクトを作成
            const ファイル = new File([撮影された画像Blob], `spulse-photo.png`, { type: 'image/png' });

            // スマホが共有機能に対応しているか、かつファイルをサポートしているか確認
            if (navigator.canShare && navigator.canShare({ files: [ファイル] })) {
                try {
                    // スマホ標準の共有メニュー（下からスッと出てくるやつ）を開く
                    await navigator.share({
                        files: [ファイル],
                        title: 'エスパルス ARフォト',
                        text: 'ARフォトフレームで撮影した写真です！'
                    });
                } catch (エラー) {
                    // ユーザーが途中でキャンセルした場合は何もしない
                    if (エラー.name !== 'AbortError') {
                        console.error('共有に失敗しました:', エラー);
                    }
                }
            } else {
                // 万が一古いスマホ等で共有機能が使えなかった場合は、従来のフォルダダウンロードに切り替える
                const リンク = document.createElement('a');
                リンク.href = 結果画像.src;
                リンク.download = `spulse-ar-photo_${Date.now()}.png`;
                document.body.appendChild(リンク);
                リンク.click();
                document.body.removeChild(リンク);
            }
        });

        // 🔄 カメラ切り替えボタンを押した時の処理
        カメラ切り替えボタン.addEventListener('click', () => {
            const シーン = document.querySelector('a-scene');
            if (!シーン || !シーン.systems.arjs) return;

            現在のカメラモード = (現在のカメラモード === 'environment') ? 'user' : 'environment';

            const ビデオ要素 = document.querySelector('video');
            if (ビデオ要素 && ビデオ要素.srcObject) {
                ビデオ要素.srcObject.getTracks().forEach(トラック => トラック.stop());
            }

            navigator.mediaDevices.getUserMedia({
                audio: false,
                video: {
                    facingMode: 現在のカメラモード,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            }).then((ストリーム) => {
                if (ビデオ要素) {
                    ビデオ要素.srcObject = ストリーム;
                    ビデオ要素.play();
                    
                    if (現在のカメラモード === 'user') {
                        ビデオ要素.style.transform = 'scaleX(-1)';
                    } else {
                        ビデオ要素.style.transform = 'scaleX(1)';
                    }
                }
            }).catch((エラー) => {
                alert('カメラの切り替えに失敗しました。');
                console.error(エラー);
            });
        });

        // ポップアップを閉じる処理
        function 閉じるポップアップ() {
            ポップアップ.style.display = 'none';
            撮影された画像Blob = null; // データをクリア
        }
    </script>
</body>
</html>
