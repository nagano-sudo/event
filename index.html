<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>七夕！天の川みくじ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to bottom, #0B1026, #1F2954);
            color: #fff;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #start-screen, #game-screen, #confirm-screen, #result-screen, #camera-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .hidden { display: none !important; }

        /* ボタン共通 */
        .btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #0B1026;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            cursor: pointer;
            transition: transform 0.1s;
            width: 80%;
            max-width: 300px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-sub { background: #444; color: #fff; box-shadow: none; font-size: 14px; padding: 10px 25px; width: auto; }

        /* 短冊エリアの配置 */
        #card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 35px;
            width: 100%;
            height: 240px;
        }
        .tanzaku-card {
            width: 85px;
            height: 210px;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .tanzaku-card:active { transform: scale(0.95); }
        
        .tanzaku-1 { background: linear-gradient(to bottom, #FFF0F5, #FFB6C1); border-left: 6px solid #FF69B4; }
        .tanzaku-2 { background: linear-gradient(to bottom, #F0FFFF, #E0FFFF); border-left: 6px solid #00CED1; }
        .tanzaku-3 { background: linear-gradient(to bottom, #F0FFF0, #98FB98); border-left: 6px solid #32CD32; }
        
        .tanzaku-text {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-weight: bold;
            font-size: 19px;
            writing-mode: vertical-rl;
            letter-spacing: 8px;
        }

        /* 🎉 星くず */
        .celebrate-star {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: fall 1.5s linear forwards;
            z-index: 99;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* 📷 カメラ表示エリア */
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            background: #000;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        #frame-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 5;
        }
        #preview-canvas { display: none; }
        #taken-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 4; }
        
        .camera-controls { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 5px; }
        .controls-row { display: flex; gap: 10px; justify-content: center; width: 100%; margin-top: 5px; }

        .bg-star { position: absolute; background: white; border-radius: 50%; animation: blink 2s infinite alternate; }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="stars-bg"></div>

    <div id="start-screen">
        <h1 style="color: #FFD700; margin-bottom: 5px; font-size: 30px; text-shadow: 0 0 15px rgba(255,215,0,0.5);">七夕！天の川みくじ</h1>
        <p style="font-size: 14px; margin-bottom: 40px; color: #add8e6;">運を天にまかせて、限定フォトフレームをゲットしよう！</p>
        <button class="btn" style="padding: 16px 45px; font-size: 20px;" onclick="goToGame()">おみくじを引く</button>
    </div>

    <div id="game-screen" class="hidden">
        <h2 style="color: #FFD700; font-size: 22px;">この3つから選んでね</h2>
        <p style="font-size: 14px; margin-top: 5px; color: #00FF7F; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,127,0.3);">どれを選んでもフォトフレームがもらえるよ！</p>
        
        <div id="card-container">
            <div class="tanzaku-card tanzaku-1" onclick="selectCard(1)">
                <div class="tanzaku-text">短冊①</div>
            </div>
            <div class="tanzaku-card tanzaku-2" onclick="selectCard(2)">
                <div class="tanzaku-text">短冊②</div>
            </div>
            <div class="tanzaku-card tanzaku-3" onclick="selectCard(3)">
                <div class="tanzaku-text">短冊③</div>
            </div>
        </div>
    </div>

    <div id="confirm-screen" class="hidden">
        <h2 style="color: #FFD700; font-size: 24px; margin-bottom: 15px;">魂を込めて……</h2>
        <p style="font-size: 15px; margin-bottom: 30px;">選んだ短冊から、天の川のパワーを感じるぞ！</p>
        
        <div id="selected-card-preview" class="tanzaku-card" style="pointer-events: none; margin-bottom: 25px;">
            <div class="tanzaku-text"></div>
        </div>

        <button class="btn" style="background: linear-gradient(45deg, #00FF7F, #00CE66); color:#fff;" onclick="drawOmikuji()">🔮 結果をみる！</button>
    </div>

    <div id="result-screen" class="hidden">
        <p style="font-size: 16px; color: #add8e6; margin-bottom: 5px;">あなたの運勢は…</p>
        <h2 id="result-title" style="font-size: 42px; margin-bottom: 15px; text-shadow: 0 0 15px #FFD700;"></h2>
        <p id="result-text" style="font-size: 16px; margin-bottom: 35px; white-space: pre-line; line-height: 1.6;"></p>
        
        <button class="btn" onclick="openCamera()">このフレームでカメラを起動</button>
        <button class="btn btn-sub" onclick="resetGame()" style="margin-top: 25px;">タイトルへ戻る</button>
    </div>

    <div id="camera-screen" class="hidden">
        <h2 style="color: #FFD700; font-size: 18px; margin-bottom: 10px;" id="camera-instruction">はい、チーズ！</h2>
        
        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
            <img id="frame-overlay" src="" alt="Frame" crossorigin="anonymous">
            <img id="taken-image" class="hidden">
        </div>

        <div id="before-shoot" class="camera-controls" style="margin-top: 15px;">
            <div class="controls-row">
                <button class="btn btn-sub" onclick="switchCamera()">🔄 カメラ切替</button>
                <button class="btn" style="width: 160px; margin-top: 0;" onclick="takePhoto()">📸 パシャリ！</button>
            </div>
            <button class="btn btn-sub" onclick="closeCamera()" style="margin-top: 10px;">戻る</button>
        </div>

        <div id="after-shoot" class="camera-controls hidden" style="margin-top: 10px;">
            <button class="btn" style="background: linear-gradient(45deg, #00FF7F, #00CE66); color: #fff;" onclick="sharePhoto()">📤 写真を保存・共有</button>
            
            <button class="btn" style="background: linear-gradient(45deg, #1F2954, #3a4b91); color: #FFD700; border: 1px solid #FFD700;" onclick="returnToTop()">🏠 タイトルへ戻る</button>
            
            <div class="controls-row" style="margin-top: 5px;">
                <button class="btn btn-sub" onclick="retakePhoto()">🔄 もう一度撮る（撮り直し）</button>
            </div>
        </div>
        
        <canvas id="preview-canvas"></canvas>
    </div>

    <script>
        // 背景の星生成
        const bg = document.getElementById('stars-bg');
        for(let i=0; i<40; i++) {
            let star = document.createElement('div'); star.className = 'bg-star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.top = Math.random() * 100 + 'vh'; star.style.left = Math.random() * 100 + 'vw';
            bg.appendChild(star);
        }

        // --- ⚙️ おみくじとフォトフレームの設定 ---
        let selectedFrame = ""; 
        let currentBlob = null; 

        // 🌟 3つの画像ファイル名がすべて反映されています
        const omikujiResults = {
            amanogawa: {
                title: "天の川吉 ✨",
                text: "最高のラッキー！\n満天の星空があなたに幸運を届けてくれるよ。",
                frame: "tanabata_photoframe_1.png" 
            },
            orihime: {
                title: "織姫彦星吉 💞",
                text: "すてきなハッピー！\nたいせつな人との願い事が叶うかもしれないね。",
                frame: "tanabata_photoframe_2.png" 
            },
            sasanoha: {
                title: "笹の葉吉 🎋",
                text: "まったりラッキー！\n短冊に書いた願い事が、風にのって天まで届くよ。",
                frame: "tanabata_photoframe_3.png" 
            }
        };

        function goToGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        }

        function selectCard(cardNumber) {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('confirm-screen').classList.remove('hidden');
            
            const preview = document.getElementById('selected-card-preview');
            preview.className = "tanzaku-card tanzaku-" + cardNumber;
            
            const numMap = ["","①","②","③"];
            preview.querySelector('.tanzaku-text').innerText = "短冊" + numMap[cardNumber];
        }

        function drawOmikuji() {
            document.getElementById('confirm-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let resultKey = "sasanoha";
            const rand = Math.random();

            if (rand < 0.333) resultKey = "amanogawa";
            else if (rand < 0.666) resultKey = "orihime";
            else resultKey = "sasanoha";

            const result = omikujiResults[resultKey];
            
            document.getElementById('result-title').innerText = result.title;
            document.getElementById('result-text').innerText = result.text;
            
            selectedFrame = result.frame;
            document.getElementById('frame-overlay').src = selectedFrame;

            if (resultKey === 'amanogawa') {
                for (let i = 0; i < 25; i++) {
                    setTimeout(spawnCelebrateStar, i * 40);
                }
            }
        }

        function spawnCelebrateStar() {
            const star = document.createElement('div');
            star.className = 'celebrate-star';
            star.innerText = ['✨','⭐','🌟'][Math.floor(Math.random() * 3)];
            star.style.left = Math.random() * 100 + 'vw';
            star.style.fontSize = (Math.random() * 20 + 20) + 'px';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 1500);
        }

        function resetGame() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        // --- 📷 カメラ機能 ---
        let currentStream = null;
        let useFacingMode = "user"; 

        async function openCamera() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('camera-screen').classList.remove('hidden');
            retakePhoto();
            await initCamera();
        }

        async function initCamera() {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); }
            const video = document.getElementById('video');
            if(useFacingMode === "user") { video.classList.add('mirror'); } else { video.classList.remove('mirror'); }

            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFacingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
                    audio: false
                });
                video.srcObject = currentStream;
            } catch (err) {
                console.error("カメラ起動失敗:", err);
                alert("カメラの起動に失敗しました。カメラ使用を許可してください。");
            }
        }

        async function switchCamera() {
            useFacingMode = (useFacingMode === "user") ? "environment" : "user";
            await initCamera();
        }

        function takePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('preview-canvas');
            const ctx = canvas.getContext('2d');
            const frameImg = document.getElementById('frame-overlay');
            const takenImage = document.getElementById('taken-image');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.save();
            if (useFacingMode === "user") {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            try {
                ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
                
                const dataUrl = canvas.toDataURL('image/png');
                takenImage.src = dataUrl;
                takenImage.classList.remove('hidden');

                canvas.toBlob((blob) => {
                    currentBlob = blob;
                }, 'image/png');

                document.getElementById('before-shoot').classList.add('hidden');
                document.getElementById('after-shoot').classList.remove('hidden');
                document.getElementById('camera-instruction').innerText = "きれいに撮れたかな？";
            } catch(e) {
                console.error("画像合成エラー:", e);
                alert("画像の合成に失敗しました。");
            }
        }

        async function sharePhoto() {
            if (!currentBlob) {
                alert("写真の準備ができていません。もう一度撮影してください。");
                return;
            }

            const file = new File([currentBlob], "tanabata_photo.png", { type: "image/png" });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: '七夕！天の川みくじフォト',
                        text: 'おみくじカメラで撮影したよ！'
                    });
                } catch (err) {
                    console.log("共有がキャンセルまたは失敗しました:", err);
                }
            } else {
                alert("お使いのブラウザは直接の共有メニューに対応していません。画像を長押しするかスクリーンショットで保存してください。");
            }
        }

        function retakePhoto() {
            currentBlob = null;
            const takenImage = document.getElementById('taken-image');
            takenImage.classList.add('hidden');
            takenImage.src = "";
            
            document.getElementById('before-shoot').classList.remove('hidden');
            document.getElementById('after-shoot').classList.add('hidden');
            document.getElementById('camera-instruction').innerText = "はい、チーズ！";
        }

        function closeCamera() {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; }
            document.getElementById('camera-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }

        function returnToTop() {
            if (currentStream) { 
                currentStream.getTracks().forEach(track => track.stop()); 
                currentStream = null; 
            }
            document.getElementById('camera-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
