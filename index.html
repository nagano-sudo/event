<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>七夕！天の川の星くずキャッチ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to bottom, #0B1026, #1F2954);
            color: #fff;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #start-screen, #game-screen, #result-screen, #camera-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .hidden { display: none !important; }

        /* ボタン */
        .btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #0B1026;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            cursor: pointer;
        }
        .btn-sub {
            background: #444;
            color: #fff;
            box-shadow: none;
            font-size: 14px;
            padding: 8px 20px;
        }

        /* 📊 ゲーム画面（情報バーの位置を調整） */
        #info-bar {
            position: absolute;
            top: 50px; /* ★上部から50px下に下げて、見えなくなるのを防ぎました */
            width: 90%;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            background: rgba(255,255,255,0.15);
            padding: 12px 20px;
            border-radius: 20px;
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        #game-area { position: relative; width: 100%; height: 100%; }
        #basket {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            background: #8B4513;
            border-radius: 0 0 20px 20px;
            border: 4px solid #CD853F;
            z-index: 8;
        }
        #basket::before { content: "🧺"; position: absolute; top: -25px; left: 22px; font-size: 24px; }
        .item { position: absolute; font-size: 32px; will-change: transform; z-index: 7; }
        .bg-star { position: absolute; background: white; border-radius: 50%; animation: blink 2s infinite alternate; }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }

        /* 📷 カメラ画面のスタイル */
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            background: #000;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        #frame-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 5;
        }
        #preview-canvas { display: none; }
        #taken-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 4; }
        .camera-controls { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="stars-bg"></div>

    <div id="start-screen">
        <h1 style="color: #FFD700; margin-bottom: 10px; font-size: 28px;">天の川の星くずキャッチ</h1>
        <p style="font-size: 14px; margin-bottom: 30px; line-height: 1.6;">
            制限時間内に【100点】を目指そう！<br>
            ★をキャッチすると +10点<br>
            ◆にあたると -20点
        </p>
        <button class="btn" onclick="startGame()">ゲームスタート</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="info-bar">
            <div id="score-display">スコア: 0</div>
            <div id="timer-display">残り時間: 30s</div>
        </div>
        <div id="game-area"><div id="basket"></div></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="result-title" style="font-size: 32px; margin-bottom: 10px;"></h2>
        <p id="result-text" style="font-size: 18px; margin-bottom: 30px;"></p>
        
        <div id="prize-zone" class="hidden">
            <p style="color: #FFD700; font-weight: bold; margin-bottom: 10px;">🎉 おめでとうございます！ 🎉</p>
            <button class="btn" onclick="openCamera()">限定カメラを起動する</button>
        </div>
        <button class="btn btn-sub" onclick="resetGame()">もう一度遊ぶ</button>
    </div>

    <div id="camera-screen" class="hidden">
        <h2 style="color: #FFD700; font-size: 20px; margin-bottom: 10px;" id="camera-instruction">カメラに許可を出してね</h2>
        
        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
            <img id="frame-overlay" src="https://via.placeholder.com/600x800/000000/000000?text=+" alt="Frame">
            <img id="taken-image" class="hidden">
        </div>

        <div id="before-shoot" class="camera-controls">
            <button class="btn btn-sub" onclick="switchCamera()">🔄 カメラ切替</button>
            <button class="btn" onclick="takePhoto()">📸 パシャリ！</button>
        </div>

        <div id="after-shoot" class="camera-controls hidden">
            <button class="btn btn-sub" onclick="retakePhoto()">🔄 撮り直し</button>
            <a id="download-link" download="tanabata_photo.png">
                <button class="btn" style="background: linear-gradient(45deg, #00FF7F, #00CE66); color: #fff;">💾 保存する</button>
            </a>
        </div>
        
        <button class="btn btn-sub" onclick="closeCamera()" style="margin-top: 25px;">ゲームに戻る</button>
        <canvas id="preview-canvas"></canvas>
    </div>

    <script>
        // 背景の星生成
        const bg = document.getElementById('stars-bg');
        for(let i=0; i<40; i++) {
            let star = document.createElement('div'); star.className = 'bg-star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.top = Math.random() * 100 + 'vh'; star.style.left = Math.random() * 100 + 'vw';
            bg.appendChild(star);
        }

        // --- ゲーム処理メンバ ---
        let score = 0; let timeLeft = 30; let gameActive = false;
        let gameInterval, spawnInterval, animationFrameId; let items = [];
        const basket = document.getElementById('basket'); const gameArea = document.getElementById('game-area');
        let basketX = window.innerWidth / 2;

        window.addEventListener('touchmove', (e) => { if (gameActive) moveBasket(e.touches[0].clientX); }, { passive: true });
        window.addEventListener('mousemove', (e) => { if (gameActive) moveBasket(e.clientX); });
        
        function moveBasket(clientX) {
            const w = basket.offsetWidth; basketX = clientX;
            if (basketX < w/2) basketX = w/2; if (basketX > window.innerWidth - w/2) basketX = window.innerWidth - w/2;
            basket.style.left = basketX + 'px';
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            score = 0; timeLeft = 30; gameActive = true; items = [];
            document.getElementById('score-display').innerText = `スコア: ${score}`;
            document.getElementById('timer-display').innerText = `残り時間: ${timeLeft}s`;
            
            gameInterval = setInterval(() => {
                timeLeft--; document.getElementById('timer-display').innerText = `残り時間: ${timeLeft}s`;
                if (timeLeft <= 0) endGame();
            }, 1000);
            spawnInterval = setInterval(spawnItem, 600);
            animationFrameId = requestAnimationFrame(updateItems);
        }

        function spawnItem() {
            if (!gameActive) return;
            const item = document.createElement('div'); item.className = 'item';
            const isStar = Math.random() > 0.25;
            item.innerText = isStar ? '★' : '◆'; item.dataset.type = isStar ? 'star' : 'cloud';
            item.style.color = isStar ? '#FFD700' : '#555577'; 
            item.style.top = '0px';
            item.style.left = Math.random() * (window.innerWidth - 40) + 'px';
            gameArea.appendChild(item);
            items.push({ element: item, y: 0, x: parseFloat(item.style.left), speed: Math.random() * 3 + 4 });
        }

        // ★安全な当たり判定に修正しました
        function updateItems() {
            if (!gameActive) return;
            
            // カゴの位置情報を取得
            const basketRect = basket.getBoundingClientRect();

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                if (!item || !item.element) { items.splice(i, 1); continue; }

                item.y += item.speed;
                item.element.style.top = item.y + 'px';

                // 各アイテムの位置情報を取得
                let itemRect = item.element.getBoundingClientRect();
                
                // 厳密かつエラーの出ない当たり判定処理
                if (
                    itemRect.bottom >= basketRect.top &&
                    itemRect.top <= basketRect.bottom &&
                    itemRect.right >= basketRect.left &&
                    itemRect.left <= basketRect.right
                ) {
                    if (item.dataset.type === 'star') { 
                        score += 10; 
                    } else { 
                        score = Math.max(0, score - 20); 
                    }
                    document.getElementById('score-display').innerText = `スコア: ${score}`;
                    
                    item.element.remove(); 
                    items.splice(i, 1); 
                    continue;
                }

                // 画面外（下部）に出たら削除
                if (item.y > window.innerHeight) { 
                    item.element.remove(); 
                    items.splice(i, 1); 
                }
            }
            if (gameActive) {
                animationFrameId = requestAnimationFrame(updateItems);
            }
        }

        function endGame() {
            gameActive = false; 
            clearInterval(gameInterval); 
            clearInterval(spawnInterval);
            cancelAnimationFrame(animationFrameId);
            
            // 残った画面上のアイテムを安全に全削除
            const allItems = document.querySelectorAll('.item');
            allItems.forEach(el => el.remove());
            items = [];

            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const title = document.getElementById('result-title'); 
            const prizeZone = document.getElementById('prize-zone');
            
            if (score >= 100) {
                title.innerText = "クリア！"; title.style.color = "#FFD700";
                document.getElementById('result-text').innerText = `スコアは ${score} 点でした！`;
                prizeZone.classList.remove('hidden');
            } else {
                title.innerText = "ざんねん！"; title.style.color = "#FF4500";
                document.getElementById('result-text').innerText = `スコアは ${score} 点でした。\n100点に届かなかったよ`;
                prizeZone.classList.add('hidden');
            }
        }

        function resetGame() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        // --- 📷 カメラ・フォトフレーム合成機能 ---
        let currentStream = null;
        let useFacingMode = "user"; 

        // ※実際の透過フォトフレームのURLをここにセットしてください
        const FRAME_IMAGE_SRC = "https://example.com/your-tanabata-frame.png"; 
        document.getElementById('frame-overlay').src = FRAME_IMAGE_SRC;

        async function openCamera() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('camera-screen').classList.remove('hidden');
            document.getElementById('camera-instruction').innerText = "はい、チーズ！";
            retakePhoto();
            await initCamera();
        }

        async function initCamera() {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); }
            const video = document.getElementById('video');
            if(useFacingMode === "user") { video.classList.add('mirror'); } else { video.classList.remove('mirror'); }

            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: useFacingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
                    audio: false
                });
                video.srcObject = currentStream;
            } catch (err) {
                console.error("カメラ起動失敗:", err);
                alert("カメラの起動に失敗しました。ブラウザのカメラ使用を許可してください。");
            }
        }

        async function switchCamera() {
            useFacingMode = (useFacingMode === "user") ? "environment" : "user";
            await initCamera();
        }

        function takePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('preview-canvas');
            const ctx = canvas.getContext('2d');
            const frameImg = document.getElementById('frame-overlay');
            const takenImage = document.getElementById('taken-image');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.save();
            if (useFacingMode === "user") {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

            const dataUrl = canvas.toDataURL('image/png');
            takenImage.src = dataUrl;
            takenImage.classList.remove('hidden');

            document.getElementById('download-link').href = dataUrl;
            document.getElementById('before-shoot').classList.add('hidden');
            document.getElementById('after-shoot').classList.remove('hidden');
            document.getElementById('camera-instruction').innerText = "きれいに撮れたかな？";
        }

        function retakePhoto() {
            document.getElementById('taken-image').classList.add('hidden');
            document.getElementById('taken-image').src = "";
            document.getElementById('before-shoot').classList.remove('hidden');
            document.getElementById('after-shoot').classList.add('hidden');
            document.getElementById('camera-instruction').innerText = "はい、チーズ！";
        }

        function closeCamera() {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; }
            document.getElementById('camera-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
