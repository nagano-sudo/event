<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>七夕！天の川の星くずキャッチ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to bottom, #0B1026, #1F2954);
            color: #fff;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        /* 画面レイアウト */
        #start-screen, #game-screen, #result-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .hidden { display: none !important; }

        /* ボタン */
        .btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #0B1026;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            cursor: pointer;
        }

        /* ゲーム画面 */
        #info-bar {
            position: absolute;
            top: 10px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 10;
        }
        #game-area {
            position: relative;
            width: 100%;
            height: 100%;
        }
        #basket {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            background: #8B4513;
            border-radius: 0 0 20px 20px;
            border: 4px solid #CD853F;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #basket::before {
            content: "🧺";
            position: absolute;
            top: -25px;
            left: 22px;
            font-size: 24px;
        }
        .item {
            position: absolute;
            font-size: 32px;
            will-change: transform;
        }

        /* 装飾的な背景の星 */
        .bg-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: blink 2s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="stars-bg"></div>

    <div id="start-screen">
        <h1 style="color: #FFD700; margin-bottom: 10px; font-size: 28px;">天の川の星くずキャッチ</h1>
        <p style="font-size: 14px; margin-bottom: 30px; line-height: 1.6;">
            制限時間内に【100点】を目指そう！<br>
            ★をキャッチすると +10点<br>
            ◆（黒い雲）にあたると -20点
        </p>
        <button class="btn" onclick="startGame()">ゲームスタート</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="info-bar">
            <div id="score-display">スコア: 0</div>
            <div id="timer-display">残り時間: 30s</div>
        </div>
        <div id="game-area">
            <div id="basket"></div>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="result-title" style="font-size: 32px; margin-bottom: 10px;"></h2>
        <p id="result-text" style="font-size: 18px; margin-bottom: 30px;"></p>
        
        <div id="prize-zone" class="hidden">
            <p style="color: #FFD700; font-weight: bold; margin-bottom: 10px;">🎉 おめでとうございます！ 🎉</p>
            <a href="https://example.com/photo-frame.png" download="nanabata_frame.png">
                <button class="btn">フォトフレームをもらう</button>
            </a>
        </div>

        <button class="btn" onclick="resetGame()" style="background: #666; color: #fff; box-shadow: none; font-size: 16px; padding: 10px 20px;">もう一度遊ぶ</button>
    </div>

    <script>
        // 背景の星を自動生成
        const bg = document.getElementById('stars-bg');
        for(let i=0; i<50; i++) {
            let star = document.createElement('div');
            star.className = 'bg-star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 2 + 's';
            bg.appendChild(star);
        }

        // ゲーム変数
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let gameInterval, spawnInterval;
        let items = [];

        const basket = document.getElementById('basket');
        const gameArea = document.getElementById('game-area');
        let basketX = window.innerWidth / 2;

        // 操作：スマホのスワイプ・PCのマウス移動両対応
        window.addEventListener('touchmove', (e) => {
            if (!gameActive) return;
            moveBasket(e.touches[0].clientX);
        });
        window.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            moveBasket(e.clientX);
        });

        function moveBasket(clientX) {
            const basketWidth = basket.offsetWidth;
            basketX = clientX;
            // 画面外にはみ出さない処理
            if (basketX < basketWidth/2) basketX = basketWidth/2;
            if (basketX > window.innerWidth - basketWidth/2) basketX = window.innerWidth - basketWidth/2;
            basket.style.left = basketX + 'px';
        }

        // ゲーム開始
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            score = 0;
            timeLeft = 30;
            gameActive = true;
            items = [];
            
            document.getElementById('score-display').innerText = `スコア: ${score}`;
            document.getElementById('timer-display').innerText = `残り時間: ${timeLeft}s`;

            // タイマー開始
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = `残り時間: ${timeLeft}s`;
                if (timeLeft <= 0) endGame();
            }, 1000);

            // アイテム降らせる
            spawnInterval = setInterval(spawnItem, 600);

            // ループ処理
            requestAnimationFrame(updateItems);
        }

        // アイテム生成
        function spawnItem() {
            if (!gameActive) return;
            const item = document.createElement('div');
            item.className = 'item';
            
            // 確率で星か雲かを変える (75%で星、25%で雲)
            const isStar = Math.random() > 0.25;
            item.innerText = isStar ? '★' : '◆';
            item.dataset.type = isStar ? 'star' : 'cloud';
            item.style.color = isStar ? '#FFD700' : '#555577';

            item.style.top = '-40px';
            item.style.left = Math.random() * (window.innerWidth - 40) + 'px';
            
            gameArea.appendChild(item);
            items.push({
                element: item,
                y: -40,
                x: parseFloat(item.style.left),
                speed: Math.random() * 3 + 4 // 落ちる速度
            });
        }

        // アイテムの移動と当たり判定
        function updateItems() {
            if (!gameActive) return;

            const basketRect = basket.getBoundingClientRect();

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += item.speed;
                item.element.style.transform = `translateY(${item.y}px)`;

                // キャッチ判定
                let itemRect = item.element.getBoundingClientRect();
                if (
                    itemRect.bottom >= basketRect.top &&
                    itemRect.top <= basketRect.bottom &&
                    itemRect.right >= basketRect.left &&
                    itemRect.left <= basketRect.right
                ) {
                    // スコア計算
                    if (item.dataset.type === 'star') {
                        score += 10;
                    } else {
                        score = Math.max(0, score - 20); // 0点以下にはならない
                    }
                    document.getElementById('score-display').innerText = `スコア: ${score}`;
                    
                    // 削除
                    item.element.remove();
                    items.splice(i, 1);
                    continue;
                }

                // 画面外に出たら削除
                if (item.y > window.innerHeight) {
                    item.element.remove();
                    items.splice(i, 1);
                }
            }
            requestAnimationFrame(updateItems);
        }

        // ゲーム終了
        function endGame() {
            gameActive = false;
            clearInterval(gameInterval);
            clearInterval(spawnInterval);

            // 残ったアイテムを全削除
            items.forEach(item => item.element.remove());

            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const prizeZone = document.getElementById('prize-zone');

            if (score >= 100) {
                title.innerText = "クリア！";
                title.style.color = "#FFD700";
                text.innerText = `スコアは ${score} 点でした！\n天の川がきれいに輝いています！`;
                prizeZone.classList.remove('hidden');
            } else {
                title.innerText = "ざんねん！";
                title.style.color = "#FF4500";
                text.innerText = `スコアは ${score} 点でした。\nもうすこしで星がたりないみたい…`;
                prizeZone.classList.add('hidden');
            }
        }

        // リセット
        function resetGame() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
