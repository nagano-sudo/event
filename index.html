<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>七夕！天の川みくじ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to bottom, #0B1026, #1F2954);
            color: #fff;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #start-screen, #game-screen, #confirm-screen, #result-screen, #camera-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .hidden { display: none !important; }

        /* ボタン共通 */
        .btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #0B1026;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-sub { background: #444; color: #fff; box-shadow: none; font-size: 14px; padding: 8px 20px; }

        /* 短冊エリアの配置 */
        #card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 35px;
            width: 100%;
            height: 240px;
            position: relative;
        }
        .tanzaku-card {
            width: 85px;
            height: 210px;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            will-change: transform; /* ブラウザの描画を滑らかにする魔法のプロパティ */
        }
        
        /* 短冊のグラデーション色分け */
        .tanzaku-1 { background: linear-gradient(to bottom, #FFF0F5, #FFB6C1); border-left: 6px solid #FF69B4; }
        .tanzaku-2 { background: linear-gradient(to bottom, #F0FFFF, #E0FFFF); border-left: 6px solid #00CED1; }
        .tanzaku-3 { background: linear-gradient(to bottom, #F0FFF0, #98FB98); border-left: 6px solid #32CD32; }
        
        .tanzaku-text {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-weight: bold;
            font-size: 19px;
            writing-mode: vertical-rl;
            letter-spacing: 8px;
        }

        /* 🌪️ ダイナミック・シャッフルアニメーション */
        .shuffle-left { animation: moveLeft 0.4s ease-in-out 4 alternate; }
        .shuffle-right { animation: moveRight 0.4s ease-in-out 4 alternate; }
        .shuffle-center { animation: moveCenter 0.2s ease-in-out 8 alternate; }

        @keyframes moveLeft {
            0% { transform: translateX(0) scale(1); z-index: 1; }
            100% { transform: translateX(105px) scale(1.1); z-index: 10; }
        }
        @keyframes moveRight {
            0% { transform: translateX(0) scale(1); z-index: 1; }
            100% { transform: translateX(-105px) scale(0.9); z-index: -1; }
        }
        @keyframes moveCenter {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(0.9) rotate(-5deg); }
        }

        /* 🎉 お祝いの星くずエフェクト */
        .celebrate-star {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: fall 1.5s linear forwards;
            z-index: 99;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* 📷 カメラ表示 */
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            background: #000;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        #frame-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 5;
        }
        #preview-canvas { display: none; }
        #taken-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 4; }
        .camera-controls { display: flex; gap: 10px; margin-top: 15px; }

        .bg-star { position: absolute; background: white; border-radius: 50%; animation: blink 2s infinite alternate; }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="stars-bg"></div>

    <div id="start-screen">
        <h1 style="color: #FFD700; margin-bottom: 5px; font-size: 30px; text-shadow: 0 0 15px rgba(255,215,0,0.5);">七夕！天の川みくじ</h1>
        <p style="font-size: 14px; margin-bottom: 40px; color: #add8e6;">運を天にまかせて、限定フォトフレームをゲットしよう！</p>
        <button class="btn" style="padding: 16px 45px; font-size: 20px;" onclick="goToGame()">みくじを引く</button>
    </div>

    <div id="game-screen" class="hidden">
        <h2 id="game-instruction" style="color: #FFD700; font-size: 22px;">好きな短冊を1枚
